name: MIDIAutomation
options:
  bundleIdPrefix: com.northwoods
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  WhisperKit:
    url: https://github.com/NorthwoodsCommunityChurch/WhisperKit.git
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  MIDIAutomation:
    type: application
    platform: macOS
    sources:
      - MIDIAutomation
    resources:
      - MIDIAutomation/Resources/Assets.xcassets
      - MIDIAutomation/Resources/align_lyrics.py
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.northwoods.MIDIAutomation
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: MIDIAutomation/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: WhisperKit
      - package: Sparkle

  MIDIAutomationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MIDIAutomationTests
    dependencies:
      - target: MIDIAutomation
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
